<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: #e3f2fd;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 90%;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            width: 95%;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Qeydiyyat</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Şifrə">
    <input type="password" id="confirmPassword" placeholder="Şifrəni təkrarla">

    <button onclick="register()">Qeydiyyatdan keç</button>

    <a href="login.html">Giriş et</a>
</div>

<script>
async function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!username || !password) {
        alert("Bütün xanaları doldur");
        return;
    }

    if (password !== confirmPassword) {
        alert("Parollar üst-üstə düşmür");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        console.log("SERVER RESPONSE:", data);

        if (data.success) {
            alert("Uğurla qeydiyyatdan keçdiniz");
            window.location.href = "login.html";
        } else {
            alert(data.message || "Register uğursuzdur");
        }

    } catch (err) {
        console.log(err);
        alert("Serverə qoşulmaq olmadı");
    }
}
</script>

</body>
</html>
