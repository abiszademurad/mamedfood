<!DOCTYPE html>
<html lang="az">
<head>

      margin-top: 150px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: darkblue;
    }
  </style>
</head>

<body>

<div class="center-box">
  <h1>Mamed FOOD</h1>
  <p>Zəhmət olmasa daxil olun və ya qeydiyyatdan keçin</p>

  <button onclick="goLogin()">Giriş</button>
  <button onclick="goRegister()">Qeydiyyat</button>
</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}

function goRegister() {
  window.location.href = "register.html";
}
</script>

</body>
</html>
